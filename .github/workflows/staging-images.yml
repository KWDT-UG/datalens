name: Staging Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_IMAGE_REPOSITORY: ${{ vars.DOCKER_IMAGE_REPOSITORY || secrets.DOCKER_IMAGE_REPOSITORY }}
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  RAILWAY_BACKEND_SERVICE: ${{ vars.RAILWAY_BACKEND_SERVICE }}
  RAILWAY_FRONTEND_SERVICE: ${{ vars.RAILWAY_FRONTEND_SERVICE }}

jobs:
  backend-checks:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/*.txt

      - name: Install backend dependencies
        run: python -m pip install -r requirements/dev.txt

      - name: Run Django system checks
        run: python manage.py check --settings=config.settings.test

      - name: Run backend tests
        run: python manage.py test --settings=config.settings.test

  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test:run

      - name: Build and verify PWA
        run: npm run pwa:check

  build-and-push-backend:
    name: Build and push backend image
    runs-on: ubuntu-latest
    needs:
      - backend-checks
      - frontend-checks
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker image configuration
        run: |
          missing=0
          if [ -z "$DOCKER_IMAGE_REPOSITORY" ]; then
            echo "DOCKER_IMAGE_REPOSITORY must be set as a repository variable or secret."
            missing=1
          fi
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "DOCKERHUB_USERNAME must be set as a repository variable or secret."
            missing=1
          fi
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "DOCKERHUB_TOKEN must be set as a repository secret."
            missing=1
          fi
          exit "$missing"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=backend-staging
            type=sha,prefix=backend-sha-,format=long
          labels: |
            org.opencontainers.image.title=KWDT Data Lens backend
            org.opencontainers.image.description=KWDT Data Lens backend staging image

      - name: Build and push backend image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Summarize published image
        run: |
          {
            echo "### backend image"
            echo "- Moving staging tag: \`${DOCKER_IMAGE_REPOSITORY}:backend-staging\`"
            echo "- Commit tag: \`${DOCKER_IMAGE_REPOSITORY}:backend-sha-${GITHUB_SHA}\`"
            echo "- Image digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build-and-push-frontend:
    name: Build and push frontend image
    runs-on: ubuntu-latest
    needs:
      - build-and-push-backend
      - frontend-checks
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker image configuration
        run: |
          missing=0
          if [ -z "$DOCKER_IMAGE_REPOSITORY" ]; then
            echo "DOCKER_IMAGE_REPOSITORY must be set as a repository variable or secret."
            missing=1
          fi
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "DOCKERHUB_USERNAME must be set as a repository variable or secret."
            missing=1
          fi
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "DOCKERHUB_TOKEN must be set as a repository secret."
            missing=1
          fi
          exit "$missing"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=frontend-staging
            type=sha,prefix=frontend-sha-,format=long
          labels: |
            org.opencontainers.image.title=KWDT Data Lens frontend
            org.opencontainers.image.description=KWDT Data Lens frontend staging image

      - name: Build and push frontend image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Summarize published image
        run: |
          {
            echo "### frontend image"
            echo "- Moving staging tag: \`${DOCKER_IMAGE_REPOSITORY}:frontend-staging\`"
            echo "- Commit tag: \`${DOCKER_IMAGE_REPOSITORY}:frontend-sha-${GITHUB_SHA}\`"
            echo "- Image digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  redeploy-backend:
    name: Redeploy Railway backend
    runs-on: ubuntu-latest
    needs:
      - build-and-push-backend
    if: github.ref == 'refs/heads/main'
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - name: Validate Railway configuration
        run: |
          missing=0
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN must be set as a repository secret."
            missing=1
          fi
          if [ -z "$RAILWAY_BACKEND_SERVICE" ]; then
            echo "RAILWAY_BACKEND_SERVICE must be set as a repository variable."
            missing=1
          fi
          exit "$missing"

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Redeploy backend from backend-staging
        run: railway redeploy --service "$RAILWAY_BACKEND_SERVICE" --yes

  redeploy-frontend:
    name: Redeploy Railway frontend
    runs-on: ubuntu-latest
    needs:
      - build-and-push-frontend
      - redeploy-backend
    if: github.ref == 'refs/heads/main'
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - name: Validate Railway configuration
        run: |
          missing=0
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN must be set as a repository secret."
            missing=1
          fi
          if [ -z "$RAILWAY_FRONTEND_SERVICE" ]; then
            echo "RAILWAY_FRONTEND_SERVICE must be set as a repository variable."
            missing=1
          fi
          exit "$missing"

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Redeploy frontend from frontend-staging
        run: railway redeploy --service "$RAILWAY_FRONTEND_SERVICE" --yes
